<script>
    // ======================= 基础配置 =======================
    const levelStages = [

        "images/1.png", "images/2.png", "images/3.png", "images/4.png",

        "images/13.png", "images/14.png", "images/15.png", "images/16.png"
    ];
    
    let gameMode = "level", ROW, COL, timeLeft, timer, currentLevel = 0, map = [], domCells = [], selectedCell = null, score = 0;
    let collectedBadges = [];

    let maxWeekUnlocked = 1;
    let weekUnlockedLevels = {1: [0]};
    let isManualSelect = false, currentBGM = null, currentAudio = null, isPaused = false;
    let bgmCycleActive = false, bgmCycleIndex = 0, currentBgmOrder = [];
    let isInWyxLevel = false;
    let currentRunScore = 0;
    let timeraceStartTime = null;
    let isGameFinished = false;
    let timeraceInterval = null;
    let timelimitTimer = null;
    let lastAlert30Played = false;
    let honorUnlocked = false;
    let honors = [];
    
    let scoreHistory = JSON.parse(localStorage.getItem('linkScoreHistory') || '[]');
    let timeRaceHistory = JSON.parse(localStorage.getItem('linkTimeRaceHistory') || '[]');
    let savedHonors = JSON.parse(localStorage.getItem('gameHonors') || '[]');
    let savedMaxWeek = parseInt(localStorage.getItem('maxWeekUnlocked') || '1');
    let savedWeekUnlocked = JSON.parse(localStorage.getItem('weekUnlockedLevels') || '{"1":[0]}');
    
    let bgmUnlocked = { bgm1: true, bgm2: true, bgm3: true, bgm0: false, bgm00: false };
    const bgmItems = [
        { id: "bgm1", display: "🐻", needLevel: 0 }, { id: "bgm2", display: "🐷", needLevel: 0 }, { id: "bgm3", display: "🐑", needLevel: 0 },
        { id: "bgm0", display: "秀莲矮清-蓝心201F4", needLevel: 5 }, { id: "bgm00", display: "入院-蓝心201F4", needLevel: 9 }
    ];
    
    const canvas = document.getElementById('lineCanvas'), ctx = canvas.getContext('2d');
    
    function saveScoreToHistory(scoreVal) { scoreHistory.push(scoreVal); scoreHistory.sort((a,b)=>b-a); if(scoreHistory.length>20) scoreHistory=scoreHistory.slice(0,20); localStorage.setItem('linkScoreHistory', JSON.stringify(scoreHistory)); }
    function saveTimeToHistory(ms) { timeRaceHistory.push(ms); timeRaceHistory.sort((a,b)=>a-b); if(timeRaceHistory.length>20) timeRaceHistory=timeRaceHistory.slice(0,20); localStorage.setItem('linkTimeRaceHistory', JSON.stringify(timeRaceHistory)); }
    function saveHonors() { localStorage.setItem('gameHonors', JSON.stringify(honors)); }
    function saveMaxWeek() { localStorage.setItem('maxWeekUnlocked', maxWeekUnlocked); }
    function saveWeekUnlocked() { localStorage.setItem('weekUnlockedLevels', JSON.stringify(weekUnlockedLevels)); }
    
    function getUnlockedLevelsForWeek(week){ if(!weekUnlockedLevels[week]) weekUnlockedLevels[week] = [0]; return weekUnlockedLevels[week]; }
    function setUnlockedLevelsForWeek(week, levels){ weekUnlockedLevels[week] = levels; saveWeekUnlocked(); }
    function unlockLevelForWeek(week, levelIdx){ let levels = getUnlockedLevelsForWeek(week); if(!levels.includes(levelIdx)){ levels.push(levelIdx); setUnlockedLevelsForWeek(week, levels); } }
    
    function showRankModal(showCurrent=true, currentScoreVal=null, isTimeMode=false, currentTimeMs=null) { 
        let msg = `<h3>🏆 ${isTimeMode ? '计时模式最快' : '排行榜'}</h3>`; 
        if(isTimeMode){
            for(let i=0;i<Math.min(10,timeRaceHistory.length);i++){ let sec=(timeRaceHistory[i]/1000).toFixed(2); msg+=`<p>${i+1}. ${sec} 秒</p>`; }
            if(showCurrent && currentTimeMs!==null){ let rank=1; for(let t of timeRaceHistory) if(t<currentTimeMs) rank++; msg+=`<hr><p>✨ 本次用时: ${(currentTimeMs/1000).toFixed(2)} 秒</p><p>🏅 历史排名: 第${rank}名</p>`; }
        } else {
            for(let i=0;i<Math.min(10,scoreHistory.length);i++) msg+=`<p>${i+1}. ${scoreHistory[i]} 分</p>`; 
            if(showCurrent && currentScoreVal!==null){ let r=1; for(let s of scoreHistory) if(s>currentScoreVal) r++; msg+=`<hr><p>✨ 本次得分: ${currentScoreVal} 分</p><p>🏅 历史排名: 第${r}名</p>`; }
        }
        const modal=document.createElement('div'); modal.className='rank-modal'; modal.innerHTML=msg+'<button onclick="this.parentElement.remove()">关闭</button>'; document.body.appendChild(modal); 
    }
    
    // ========== BGM 管理 ==========
    function stopAllBgm() { 
        if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio.onended = null; } 
        currentAudio = null; 
        bgmCycleActive = false; 
        ["bgm1","bgm2","bgm3","bgm0","bgm00","wyx"].forEach(id => { const a = document.getElementById(id); if(a) { a.pause(); a.currentTime = 0; a.onended = null; } });
    }
    function playSingleBgm(bgmId, loop=true, onEnded=null) { 
        stopAllBgm(); 
        const audio = document.getElementById(bgmId); 
        if(audio) { 
            audio.loop = loop; 
            audio.volume = 0.35; 
            audio.onended = onEnded;
            audio.play().catch(e=>console.log("BGM play failed:", e)); 
            currentAudio = audio; 
            currentBGM = bgmId; 
        } 
        updateBgmUI();
    }
    function getUnlockedBgmOrder() { 
        let order = []; 
        if(bgmUnlocked.bgm1) order.push("bgm1"); 
        if(bgmUnlocked.bgm2) order.push("bgm2"); 
        if(bgmUnlocked.bgm3) order.push("bgm3"); 
        if(bgmUnlocked.bgm0) order.push("bgm0"); 
        if(bgmUnlocked.bgm00) order.push("bgm00"); 
        return order; 
    }
    function startBgmCycle(keepIndex=false) { 
        if(isManualSelect) return; 
        if(isInWyxLevel){ playSingleBgm("wyx",true); return; } 
        let order = getUnlockedBgmOrder();
        if(order.length === 0) return;
        if(!keepIndex) bgmCycleIndex = 0;
        else bgmCycleIndex = bgmCycleIndex % order.length;
        bgmCycleActive = true; 
        function playNext(){ 
            if(!bgmCycleActive || isManualSelect || isInWyxLevel) return; 
            let orderNow = getUnlockedBgmOrder();
            if(orderNow.length === 0) return;
            let idx = bgmCycleIndex % orderNow.length;
            let id = orderNow[idx];
            const audio = document.getElementById(id); 
            if(audio){ 
                audio.loop=false; 
                audio.volume=0.35; 
                audio.onended=()=>{ 
                    if(bgmCycleActive && !isManualSelect && !isInWyxLevel){ 
                        bgmCycleIndex++; 
                        playNext(); 
                    } 
                }; 
                audio.play().catch(e=>console.log); 
                currentAudio=audio; 
                currentBGM=id; 
                updateBgmUI();
            } else { 
                bgmCycleIndex++; 
                playNext(); 
            } 
        } 
        playNext(); 
    }
    function unlockBgm0() { 
        if(!bgmUnlocked.bgm0 && currentWeek === 1){ 
            bgmUnlocked.bgm0=true; 
            showToast("🎵 奖励曲已解锁：秀莲矮清-蓝心201F4！",4000); 
            updateBgmUI(); 
        } 
    }
    function unlockBgm00() { 
        if(!bgmUnlocked.bgm00 && currentWeek === 1){ 
            bgmUnlocked.bgm00=true; 
            showToast("🎵 奖励曲已解锁：入院-蓝心201F4！",4000); 
            updateBgmUI(); 
        } 
    }
    function checkWyxLevelAndBgm() { 
        let isWyx = (gameMode==='level' && levelStages[currentLevel]?.name === "👑 王严选");
        if(isWyx && !isInWyxLevel){ 
            isInWyxLevel=true; 
            playSingleBgm("wyx",true); 
        } else if(!isWyx && isInWyxLevel){ 
            isInWyxLevel=false; 
            if(!isManualSelect){ 
                stopAllBgm(); 
                let order = getUnlockedBgmOrder();
                if(order.length > 0){
                    let firstId = order[0];
                    const audio = document.getElementById(firstId);
                    if(audio){
                        audio.loop=false;
                        audio.volume=0.35;
                        audio.onended=()=>{
                            if(!isManualSelect && !isInWyxLevel) startBgmCycle(true);
                        };
                        audio.play().catch(e=>console.log);
                        currentAudio=audio;
                        currentBGM=firstId;
                        updateBgmUI();
                    } else { startBgmCycle(true); }
                } else { startBgmCycle(true); }
            } 
        }
    }
    function selectBgm(bgmId) { 
        if(!bgmUnlocked[bgmId]) { showToast("🔒 未解锁，继续通关吧"); return; } 
        isManualSelect=true; 
        isInWyxLevel=false; 
        stopAllBgm(); 
        playSingleBgm(bgmId,true); 
        updateBgmUI(); 
    }
    function resetBgmToAuto() { 
        isManualSelect=false; 
        checkWyxLevelAndBgm(); 
        if(!isInWyxLevel) startBgmCycle(true); 
        updateBgmUI(); 
    }
    function updateBgmUI() { 
        const container=document.getElementById('bgmSelector'); 
        if(!container) return; 
        container.innerHTML=''; 
        bgmItems.forEach(b=>{ 
            const btn=document.createElement('button'); 
            btn.textContent=b.display; 
            btn.className='bgm-option'; 
            if(bgmUnlocked[b.id]){ 
                if(currentBGM === b.id) btn.classList.add('active-bgm'); 
                btn.onclick=()=>selectBgm(b.id); 
            } else { 
                btn.classList.add('locked-bgm'); 
                btn.onclick=()=>showToast(`🔒 通关第${b.needLevel}关解锁`); 
            } 
            container.appendChild(btn); 
        }); 
    }

    function showFullscreenMedia(src, type){

        let savedBgmOrder = [...currentBgmOrder];
        let savedCurrentAudio = currentAudio;
        let savedCurrentTime = currentAudio ? currentAudio.currentTime : 0;
        let savedIsManualSelect = isManualSelect;
        
        if(currentAudio) { currentAudio.pause(); }
        
        const overlay = document.createElement('div');
        overlay.className = 'fullscreen-overlay';
        const closeBtn = document.createElement('div');
        closeBtn.className = 'close-fullscreen';
        closeBtn.innerHTML = '✕';
        closeBtn.onclick = (e) => { e.stopPropagation(); cleanup(); };
        overlay.appendChild(closeBtn);
        
        let video = null;
        const cleanup = () => {
            if(video) video.pause();
            overlay.remove();
            if(wasPlaying) {
                if(savedCurrentAudio && savedCurrentAudio.id && !savedIsManualSelect && !isInWyxLevel) {
                    let audio = document.getElementById(savedCurrentAudio.id);
                    if(audio){
                        audio.currentTime = savedCurrentTime;
                        audio.loop = false;
                        audio.volume = 0.35;
                        audio.onended = () => {
                            if(!isManualSelect && !isInWyxLevel) startBgmCycle(true);
                        };
                        audio.play().catch(e=>console.log);
                        currentAudio = audio;
                        currentBGM = savedCurrentAudio.id;
                        updateBgmUI();
                        return;
                    }
                }
                startBgmCycle(true);
            }
        };
        
        if(type === 'image'){
            const img = document.createElement('img');
            img.src = src;
            img.className = 'fullscreen-img';
            overlay.appendChild(img);
            overlay.onclick = (e) => { if(e.target === overlay) cleanup(); };
